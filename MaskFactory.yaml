dataset: MaskFactory
data_root: MaskFactory
nclass: 2
crop_size: 518

# arguments for training
epochs: 60
batch_size: 4 # per GPU x 4 GPUs
lr: 0.000005
lr_multi: 40.0
criterion:
  name: CELoss
  kwargs:
    ignore_index: 255
conf_thresh: 0.95

# arguments for model
model: dpt
backbone: dinov2_base
lock_backbone: True